<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FeeHunt</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0b1411;
      color: #e7f3ec;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .box {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .logo { font-size: 46px; margin-bottom: 18px; }
    .title { font-size: 21px; font-weight: 600; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #8fb7a4; margin-bottom: 28px; max-width: 320px; line-height: 1.5; }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #1f3a2e;
      border-top-color: #36d399;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">💸</div>
    <div class="title">FeeHunt kraunasi…</div>
    <div class="sub">
      Pirmas paleidimas gali užtrukti kelias sekundes.<br />
      Starting up — this can take a few seconds.
    </div>
    <div class="spinner"></div>
  </div>
  <script>
    // The local FeeHunt server is still booting. Poll it and jump in the moment
    // it answers, so the user sees branded feedback instead of a blank window.
    var url = "http://127.0.0.1:8501";
    function check() {
      fetch(url, { mode: "no-cors", cache: "no-store" })
        .then(function () { window.location.href = url; })
        .catch(function () { setTimeout(check, 700); });
    }
    setTimeout(check, 700);
  </script>
</body>
</html>
